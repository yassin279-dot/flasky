services:

  flasky:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=flasky.py
      - FLASK_CONFIG=development
      - DEV_DATABASE_URL=sqlite:////tmp/dev.db
    restart: always

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - prometheus